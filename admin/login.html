<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · Ingresar | Dejando Huella CR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
</head>
<body class="admin-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">
        <span class="logo-icon">🐾</span>
        <span>Dejando Huella CR</span>
      </div>
      <h1>Panel de administración</h1>
      <p class="subtitle">Ingresá con tus credenciales de administrador</p>

      <div id="login-error" class="login-error" role="alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Correo</label>
          <input type="email" id="email" name="email" required autocomplete="username" placeholder="admin@..." />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary">Ingresar al panel</button>
      </form>

      <a href="../index.html" class="back-home">← Volver al sitio</a>
    </div>
  </div>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
